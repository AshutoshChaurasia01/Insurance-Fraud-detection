<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            Claim Verification
        </h1>

        <form id="fraudForm" class="space-y-4">
            <div>
                <label for="age" class="block text-sm font-medium text-gray-700 mb-1">Insured Age</label>
                <input type="number" id="age" name="age" required
                    class="w-full px-4 py-2 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="premium" class="block text-sm font-medium text-gray-700 mb-1">Annual Premium ($)</label>
                <input type="number" id="premium" name="policy_annual_premium" required
                    class="w-full px-4 py-2 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="claimAmount" class="block text-sm font-medium text-gray-700 mb-1">Total Claim Amount
                    ($)</label>
                <input type="number" id="claimAmount" name="total_claim_amount" required
                    class="w-full px-4 py-2 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-xl shadow-sm transition-colors duration-200">
                Analyze Claim
            </button>
        </form>

        <div id="resultContainer"
            class="hidden mt-6 p-4 border border-gray-200 rounded-xl shadow-sm text-center font-bold">
            <span id="resultText"></span>
        </div>
    </div>

    <script>
        document.getElementById('fraudForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Prevent page reload

            const submitBtn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            submitBtn.textContent = 'Analyzing...';
            submitBtn.disabled = true;

            // Gather data from the form
            const age = document.getElementById('age').value;
            const premium = document.getElementById('premium').value;
            const claimAmount = document.getElementById('claimAmount').value;

            try {
                // Send the POST request to the FastAPI backend
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        age: Number(age),
                        policy_annual_premium: Number(premium),
                        total_claim_amount: Number(claimAmount)
                    })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                // Show the result
                resultContainer.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');

                if (data.prediction === 'Fraudulent') {
                    resultContainer.classList.add('bg-red-50', 'text-red-700');
                } else {
                    resultContainer.classList.add('bg-green-50', 'text-green-700');
                }

                resultText.textContent = `Result: ${data.prediction}`;

            } catch (error) {
                console.error('Error:', error);
                resultContainer.classList.remove('hidden');
                resultContainer.className = 'mt-6 p-4 border border-red-200 rounded-xl shadow-sm text-center font-bold bg-red-50 text-red-700';
                resultText.textContent = 'Error connecting to the server. Is the API running?';
            } finally {
                // Reset button
                submitBtn.textContent = 'Analyze Claim';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
